<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Change Password — Shriram Financial Tools Portal</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EBEEF3; --surface: rgba(255,255,255,0.62); --border: rgba(110,120,140,0.16);
  --text: #1D1D1F; --text-muted: #86868B;
  --accent: #F7B500; --accent-hover: #E0A400; --red: #FF3B30; --green: #1E8E3E;
  --glass-brd: rgba(255,255,255,0.75);
  --glass-hi: inset 0 1px 0 rgba(255,255,255,0.9), inset 0 0 0 1px rgba(255,255,255,0.22);
  --glass-blur: blur(28px) saturate(140%);
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 14px;
  display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; position: relative; }
body::before { content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(55% 50% at 12% -2%, rgba(255,255,255,0.95), transparent 60%),
    radial-gradient(50% 50% at 92% 8%, rgba(202,210,224,0.75), transparent 60%),
    radial-gradient(60% 60% at 50% 112%, rgba(210,217,229,0.65), transparent 60%),
    radial-gradient(30% 32% at 86% 28%, rgba(247,181,0,0.10), transparent 60%); }
.card { position: relative; z-index: 1; background: var(--surface);
  backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-brd); border-radius: 24px;
  width: 100%; max-width: 380px; padding: 40px 32px; box-shadow: var(--glass-hi), 0 24px 60px rgba(30,38,55,0.16); }
.header { text-align: center; margin-bottom: 28px; }
.logo-img { height: 44px; width: auto; margin-bottom: 14px; object-fit: contain; }
.title { font-size: 20px; font-weight: 600; letter-spacing: -0.015em; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--text-muted); }
.notice { background: #FFF8E1; border: 1px solid #F3D88A; color: #8A6D1A; border-radius: 8px;
  padding: 10px 12px; font-size: 12px; margin-bottom: 20px; }
.field { margin-bottom: 18px; }
.label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.input { width: 100%; padding: 12px; font-family: var(--font-sans); font-size: 14px; color: var(--text);
  background: rgba(255,255,255,0.78); border: 1px solid var(--glass-brd); border-radius: 10px; outline: none;
  transition: border-color .15s, box-shadow .15s; }
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(247,181,0,0.15); }
.btn { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 8px;
  font-family: var(--font-sans); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; }
.btn:hover { background: var(--accent-hover); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.message { font-size: 12px; margin-top: 16px; text-align: center; min-height: 18px; }
.message.error { color: var(--red); }
.message.success { color: var(--green); }
.switch-row { margin-top: 18px; text-align: center; font-size: 12px; }
.switch-row a { color: var(--accent-hover); font-weight: 600; text-decoration: none; }
.switch-row a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <img src="/logo.jpeg" alt="Shriram Logo" class="logo-img">
    <h2 class="title">Change Password</h2>
    <p class="subtitle">{{ mobile }}</p>
  </div>

  {% if forced %}
  <div class="notice">For your security, you must set a new password before continuing.</div>
  {% endif %}

  <form id="pw-form" onsubmit="submitChange(event)">
    <div class="field">
      <label class="label" for="current">{% if forced %}Temporary Password{% else %}Current Password{% endif %}</label>
      <input class="input" id="current" type="password" required autocomplete="current-password">
    </div>
    <div class="field">
      <label class="label" for="new">New Password</label>
      <input class="input" id="new" type="password" placeholder="At least 6 characters" required autocomplete="new-password">
    </div>
    <div class="field">
      <label class="label" for="confirm">Confirm New Password</label>
      <input class="input" id="confirm" type="password" required autocomplete="new-password">
    </div>
    <button type="submit" class="btn" id="submit-btn">Update Password</button>
  </form>
  <div class="message" id="msg"></div>
  {% if not forced %}
  <div class="switch-row"><a href="/">&larr; Back to portal</a></div>
  {% endif %}
</div>

<script>
async function submitChange(e) {
  e.preventDefault();
  const current = document.getElementById('current').value;
  const newp = document.getElementById('new').value;
  const confirm = document.getElementById('confirm').value;
  const msg = document.getElementById('msg');
  if (newp.length < 6) { msg.className = 'message error'; msg.textContent = 'New password must be at least 6 characters.'; return; }
  if (newp !== confirm) { msg.className = 'message error'; msg.textContent = 'New passwords do not match.'; return; }
  const btn = document.getElementById('submit-btn'); btn.disabled = true; btn.textContent = 'Updating…';
  const r = await fetch('/api/account/password', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ current_password: current, new_password: newp }),
  });
  const data = await r.json().catch(() => ({}));
  if (r.ok && data.ok) {
    msg.className = 'message success';
    msg.textContent = (data.message || 'Password changed.') + ' Redirecting…';
    setTimeout(() => { window.location.href = '/'; }, 900);
  } else {
    btn.disabled = false; btn.textContent = 'Update Password';
    msg.className = 'message error';
    msg.textContent = data.error || 'Could not change password.';
  }
}
</script>
</body>
</html>
