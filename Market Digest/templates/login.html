<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Login — Shriram Financial Tools Portal</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EBEEF3;
  --surface: rgba(255,255,255,0.62);
  --border: rgba(110,120,140,0.16);
  --text: #1D1D1F;
  --text-muted: #86868B;
  --accent: #F7B500; /* Shriram Yellow */
  --accent-hover: #E0A400;
  --red: #FF3B30;
  --green: #1E8E3E;
  --glass-brd: rgba(255,255,255,0.75);
  --glass-hi: inset 0 1px 0 rgba(255,255,255,0.9), inset 0 0 0 1px rgba(255,255,255,0.22);
  --glass-blur: blur(28px) saturate(140%);
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
  --transition: 0.15s cubic-bezier(0.25, 1, 0.5, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(55% 50% at 12% -2%, rgba(255,255,255,0.95), transparent 60%),
    radial-gradient(50% 50% at 92% 8%, rgba(202,210,224,0.75), transparent 60%),
    radial-gradient(60% 60% at 50% 112%, rgba(210,217,229,0.65), transparent 60%),
    radial-gradient(30% 32% at 86% 28%, rgba(247,181,0,0.10), transparent 60%);
}

.login-card {
  position: relative;
  z-index: 1;
  background: var(--surface);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-brd);
  border-radius: 24px;
  width: 100%;
  max-width: 380px;
  padding: 40px 32px;
  box-shadow: var(--glass-hi), 0 24px 60px rgba(30,38,55,0.16);
}

.header { text-align: center; margin-bottom: 32px; }
.logo-img { height: 48px; width: auto; margin-bottom: 16px; object-fit: contain; }
.title { font-size: 20px; font-weight: 600; letter-spacing: -0.015em; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--text-muted); }

.field { margin-bottom: 20px; }
.label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; }

.input {
  width: 100%;
  padding: 12px;
  font-family: var(--font-sans);
  font-size: 14px;
  color: var(--text);
  background: rgba(255,255,255,0.78);
  border: 1px solid var(--glass-brd);
  border-radius: 10px;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(247,181,0,0.15); }

.btn-login {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #000000;
  border: none;
  border-radius: 8px;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition);
  margin-top: 10px;
}
.btn-login:hover { background: var(--accent-hover); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

.message { font-size: 12px; margin-top: 16px; text-align: center; min-height: 18px; }
.message.error { color: var(--red); }
.message.success { color: var(--green); }

.switch-row { margin-top: 20px; text-align: center; font-size: 12px; color: var(--text-muted); }
.link-btn {
  background: none; border: none; padding: 0;
  color: var(--accent-hover); font-weight: 600; font-size: 12px;
  cursor: pointer; font-family: var(--font-sans);
}
.link-btn:hover { text-decoration: underline; }
.hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
.panel { display: none; }
.panel.active { display: block; }
</style>
</head>
<body>

<div class="login-card">
  <div class="header">
    <img src="/logo.jpeg" alt="Shriram Logo" class="logo-img">
    <h2 class="title" id="card-title">Sign In</h2>
    <p class="subtitle" id="card-subtitle">Enter your details to access tools</p>
  </div>

  <!-- ===== Sign In ===== -->
  <div class="panel active" id="panel-signin">
    <form id="login-form" method="POST" action="/login">
      <div class="field">
        <label class="label" for="mobile">Mobile Number</label>
        <input class="input" id="mobile" name="mobile" type="tel" placeholder="10-digit number" required autocomplete="username" maxlength="10">
      </div>
      <div class="field">
        <label class="label" for="password">Password</label>
        <input class="input" id="password" name="password" type="password" placeholder="Password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
    <div class="message error" id="signin-msg">{% if error %}{{ error }}{% endif %}</div>
    <div class="switch-row">
      <button class="link-btn" type="button" onclick="showPanel('forgot')">Forgot password?</button>
      &nbsp;·&nbsp;
      <button class="link-btn" type="button" onclick="showPanel('signup')">Create an account</button>
    </div>
  </div>

  <!-- ===== Sign Up ===== -->
  <div class="panel" id="panel-signup">
    <form id="signup-form" onsubmit="submitSignup(event)">
      <div class="field">
        <label class="label" for="su-mobile">Mobile Number</label>
        <input class="input" id="su-mobile" type="tel" placeholder="10-digit number" required maxlength="10">
      </div>
      <div class="field">
        <label class="label" for="su-password">Create Password</label>
        <input class="input" id="su-password" type="password" placeholder="At least 6 characters" required autocomplete="new-password">
      </div>
      <div class="field">
        <label class="label" for="su-confirm">Confirm Password</label>
        <input class="input" id="su-confirm" type="password" placeholder="Re-enter password" required autocomplete="new-password">
        <div class="hint">New accounts require administrator approval before first sign-in.</div>
      </div>
      <button type="submit" class="btn-login" id="su-submit">Create Account</button>
    </form>
    <div class="message" id="signup-msg"></div>
    <div class="switch-row">
      <button class="link-btn" type="button" onclick="showPanel('signin')">&larr; Back to sign in</button>
    </div>
  </div>

  <!-- ===== Forgot Password ===== -->
  <div class="panel" id="panel-forgot">
    <form id="forgot-form" onsubmit="submitForgot(event)">
      <div class="field">
        <label class="label" for="fp-mobile">Mobile Number</label>
        <input class="input" id="fp-mobile" type="tel" placeholder="10-digit number" required maxlength="10">
        <div class="hint">An administrator will be notified to reset your password.</div>
      </div>
      <button type="submit" class="btn-login" id="fp-submit">Request Reset</button>
    </form>
    <div class="message" id="forgot-msg"></div>
    <div class="switch-row">
      <button class="link-btn" type="button" onclick="showPanel('signin')">&larr; Back to sign in</button>
    </div>
  </div>
</div>

<script>
const TITLES = {
  signin:  ['Sign In', 'Enter your details to access tools'],
  signup:  ['Create Account', 'Register with your mobile number'],
  forgot:  ['Reset Password', 'We’ll notify an administrator'],
};

function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('card-title').textContent = TITLES[name][0];
  document.getElementById('card-subtitle').textContent = TITLES[name][1];
  // Clear transient messages when switching (keep server-rendered signin error).
  if (name !== 'signin') document.getElementById(name + '-msg').textContent = '';
}

function digitsOnly(el) {
  el.addEventListener('input', e => { e.target.value = e.target.value.replace(/[^0-9]/g, ''); });
}
['mobile', 'su-mobile', 'fp-mobile'].forEach(id => digitsOnly(document.getElementById(id)));

// Sign in: client-side validation only; the form posts normally.
document.getElementById('login-form').addEventListener('submit', (e) => {
  const m = document.getElementById('mobile');
  if (m.value.length !== 10) {
    e.preventDefault();
    const box = document.getElementById('signin-msg');
    box.className = 'message error';
    box.textContent = 'Please enter a valid 10-digit mobile number.';
  }
});

async function postJSON(url, body) {
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return { ok: r.ok, data: await r.json().catch(() => ({})) };
}

async function submitSignup(e) {
  e.preventDefault();
  const mobile = document.getElementById('su-mobile').value.trim();
  const password = document.getElementById('su-password').value;
  const confirm = document.getElementById('su-confirm').value;
  const msg = document.getElementById('signup-msg');
  if (mobile.length !== 10) { msg.className = 'message error'; msg.textContent = 'Enter a valid 10-digit mobile number.'; return; }
  if (password.length < 6) { msg.className = 'message error'; msg.textContent = 'Password must be at least 6 characters.'; return; }
  if (password !== confirm) { msg.className = 'message error'; msg.textContent = 'Passwords do not match.'; return; }
  const btn = document.getElementById('su-submit'); btn.disabled = true; btn.textContent = 'Creating…';
  const { ok, data } = await postJSON('/api/signup', { mobile, password });
  btn.disabled = false; btn.textContent = 'Create Account';
  if (ok && data.ok) {
    msg.className = 'message success';
    msg.textContent = data.message || 'Account created and awaiting approval.';
    document.getElementById('signup-form').reset();
  } else {
    msg.className = 'message error';
    msg.textContent = data.error || 'Could not create account.';
  }
}

async function submitForgot(e) {
  e.preventDefault();
  const mobile = document.getElementById('fp-mobile').value.trim();
  const msg = document.getElementById('forgot-msg');
  if (mobile.length !== 10) { msg.className = 'message error'; msg.textContent = 'Enter a valid 10-digit mobile number.'; return; }
  const btn = document.getElementById('fp-submit'); btn.disabled = true; btn.textContent = 'Sending…';
  const { ok, data } = await postJSON('/api/forgot', { mobile });
  btn.disabled = false; btn.textContent = 'Request Reset';
  msg.className = ok && data.ok ? 'message success' : 'message error';
  msg.textContent = (ok && data.ok ? (data.message || 'Request sent.') : (data.error || 'Could not submit request.'));
}
</script>
</body>
</html>
